services:
  - type: web
    name: quiz-tutor-backend
    runtime: python
    rootDir: apps/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker src.main:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRONTEND_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: FRONTEND_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: BACKEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: quiz_tutor
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: documents
